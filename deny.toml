[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
# Licenses present in the current dependency tree only.
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
