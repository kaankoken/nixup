[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
# Only licenses actually present in the dependency tree — a new/unexpected
# license from a dependency update fails CI for review.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
# Internal workspace crates are path deps with no version (binary-only, never
# published), which cargo-deny would otherwise flag as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
