name: fixtures

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Silence Node DEP0040 (punycode) from JS actions until upstream drops it.
  NODE_OPTIONS: --no-deprecation


jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: fixtures
          rustflags: ""

      - name: Build nixup
        run: cargo build -p nixup

      - name: Run fixtures
        run: bash scripts/run-fixtures.sh
