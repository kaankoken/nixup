name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_OPTIONS: --no-deprecation


jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.gate.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
      - name: Skip if nightly already points at HEAD
        id: gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          prev=$(gh release view nightly --json targetCommitish --jq .targetCommitish 2>/dev/null || echo "")
          if [ "$prev" = "${{ github.sha }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  roll-tag:
    needs: guard
    if: needs.guard.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Reset nightly release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release delete nightly --cleanup-tag --yes || true
      - name: Create empty nightly prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          name: "Nightly (${{ github.sha }})"
          body: "Rolling nightly build from the latest master."

  binaries:
    needs: [guard, roll-tag]
    if: needs.guard.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: nightly-${{ matrix.target }}
          rustflags: ""
      - name: Install cross
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build + upload to nightly
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: nixup
          target: ${{ matrix.target }}
          tar: unix
          checksum: sha256
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}
          archive: nixup-$target
