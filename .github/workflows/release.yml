name: release

on:
  push:
    tags: ["v[0-9]+.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" -R "${{ github.repository }}" --notes-file CHANGES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file CHANGES.md
          fi

  binaries:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: release-${{ matrix.target }}
          rustflags: ""
      - name: Install cross
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build + upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: nixup
          target: ${{ matrix.target }}
          tar: unix
          checksum: sha256
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/nixup
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  homebrew:
    needs: [create-release, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          ssh-key: ${{ secrets.HOMEBREW_DEPLOY_KEY }}
      - name: Regenerate + commit the formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp -d)"
          gh release download "${GITHUB_REF_NAME}" -R "${{ github.repository }}" -D "$tmp" -p 'nixup-*.tar.gz'
          sha() { shasum -a 256 "$tmp/$1" | cut -d' ' -f1; }
          MAC_ARM="$(sha nixup-aarch64-apple-darwin.tar.gz)"
          LNX_X64="$(sha nixup-x86_64-unknown-linux-musl.tar.gz)"
          LNX_ARM="$(sha nixup-aarch64-unknown-linux-musl.tar.gz)"
          export VERSION MAC_ARM LNX_X64 LNX_ARM
          # shellcheck disable=SC2016
          sed "s#<OWNER>#${{ github.repository_owner }}#g" .github/nixup.rb.tmpl \
            | envsubst '$VERSION $MAC_ARM $LNX_X64 $LNX_ARM' > Formula/nixup.rb
          if git diff --quiet Formula/nixup.rb; then
            echo "formula unchanged"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/nixup.rb
          git commit -m "chore(release): update Homebrew formula for ${VERSION}"
          git push origin master
