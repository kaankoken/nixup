name: verify-flake

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Silence Node DEP0040 (punycode) from JS actions until upstream drops it.
env:
  NODE_OPTIONS: --no-deprecation

jobs:
  flake:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
            check: linux
          - os: macos-14
            system: aarch64-darwin
            check: darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Flake show
        run: nix flake show --all-systems

      # Uses hosts/inventory.example.nix when inventory.nix is absent (CI).
      # Filter known upstream HM/nix-darwin options.json store-context noise.
      - name: Eval Linux homeConfiguration
        if: matrix.check == 'linux'
        run: |
          set -euo pipefail
          err="$(mktemp)"
          trap 'rm -f "$err"' EXIT
          set +e
          nix eval --raw '.#homeConfigurations."you@linux".activationPackage.drvPath' 2>"$err"
          code=$?
          set -e
          grep -v "named 'options.json'" "$err" >&2 || true
          exit "$code"

      - name: Eval Darwin configurations
        if: matrix.check == 'darwin'
        run: |
          set -euo pipefail
          err="$(mktemp)"
          trap 'rm -f "$err"' EXIT
          set +e
          nix eval --raw .#darwinConfigurations.my-mac.config.system.build.toplevel.drvPath 2>"$err"
          code=$?
          set -e
          grep -v "named 'options.json'" "$err" >&2 || true
          exit "$code"
