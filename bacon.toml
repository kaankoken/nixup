default_job = "clippy"

[jobs.check]
command = [
  "cargo",
  "check",
  "--workspace",
  "--all-targets",
  "--color",
  "always",
]
need_stdout = false

[jobs.clippy]
command = [
  "cargo",
  "clippy",
  "--workspace",
  "--all-targets",
  "--color",
  "always",
]
need_stdout = false

[jobs.nextest]
analyzer = "nextest"
command = [
  "cargo",
  "nextest",
  "run",
  "--workspace",
  "--color",
  "always",
  "--hide-progress-bar",
  "--failure-output",
  "final",
]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false

[keybindings]
c = "job:clippy"
k = "job:check"
t = "job:nextest"
